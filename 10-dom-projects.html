<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <style>
        body{
            font-family: Arial;
            font-size: 18px;
        }
        .js-subscribe-button{
            background-color: black;
            color: white;
            padding: 12px 16px 12px 16px;
            border-radius: 50px;
            border: none;
            font-family: Arial;
            font-weight: bold;
            margin-bottom: 40px;
            cursor: pointer;
            font-size: 14px;
        }

        .is-subscribed{
            background-color: rgb(238, 237, 237);
            color: black;
            font-weight: bold;
        }

        .calculate-button{
            background-color: green;
            color: white;
            padding: 13.5px 16px 13.5px 16px;
            border: none;
            font-family: Arial;
            font-size: 16px;
            display: inline;
            cursor: pointer;
        }

        .cost{
            padding: 12px 16px 12px 16px;
            font-size: 16px;
            
        }
        .cost ::placeholder{
            font-size: 18px;
        }
    </style>
</head>
<body>
    <p>YouTube Subscribe Button</p>
    <button onclick="subscribe();" class="js-subscribe-button">Subscribe</button>
    <p>Amazon Shipping Calculator</p>
    <p>Orders under $40 = +$10 shipping</p>
    <p>Orders over $40 = Free Shipping</p>
    <input 
    onkeydown=" handleCostKeyDown(event)"
     class="cost" type="text" placeholder="Cost of Orders">
    <button onclick=" costCalculation() " class="calculate-button">
        Calculate
    </button>
    <p class="js-total"></p>

    
    <script>
        function handleCostKeyDown(event){
            if(event.key=='Enter'){
                costCalculation();
            }
        }

        function subscribe(){
            const subscribeButton = document.querySelector('.js-subscribe-button')
            if (subscribeButton.innerHTML==="Subscribe"){
                subscribeButton.innerHTML = "Subscribed";
                subscribeButton.classList.add
                ('is-subscribed')
            }
            else{
                subscribeButton.innerHTML = "Subscribe";
                subscribeButton.classList.remove
                ('is-subscribed')
            }
        }

        function costCalculation(){
             const userInput = Number(document.querySelector('.cost').value)
            let totalAmount = userInput;
            if(userInput<= 40){
                totalAmount = userInput + 10;
            document.querySelector('.js-total')
            .innerHTML = `$${totalAmount}`;
            }
            else if (userInput>40) {
                totalAmount = userInput
            document.querySelector('.js-total')
            .innerHTML = `$${totalAmount}`;
            } 


        }

    </script>
</body>
</html>
