<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <p>Rock Paper Scissors</p>
    <button onclick="
    playGame('rock')
    ">
    Rock
</button>
<button onclick="
    playGame('paper')
    ">
    Paper
</button>
<button onclick="
    playGame('scissors')
    ">
    Scissors
</button>
<button onclick="
    resetScore()
">
    Reset
</button>
<script>

    function resetScore(){
        score.wins=0
        score.Ties=0
        score.losses=0
        
        alert(`Scores got reseted.\n wins:${score.wins}, losses:${score.losses},  Ties: ${score.Ties}`)
    };
    const score = {
        wins : 0,
        losses :0,
        Ties :0
    };
    function playGame(playerMove){
    const computerMove = pickComputerMove();

    if (playerMove==='scissors'){
        if (computerMove==='rock') {
            result='You Lose'
        }
        else if (computerMove==='paper'){
            result='You win'
        }
        else if (computerMove==='scissors'){
            result='Tie'
        }
    }

    else if(playerMove==='paper'){
            if (computerMove==='rock') {
                result='You win'
            }
            else if (computerMove==='paper'){
                result='Tie'
            }
            else if (computerMove==='scissors'){
                result='You Lose'
            }
        
    }

    else if(playerMove==='rock'){
        console.log(computerMove)
        if (computerMove==='rock'){
            result='Tie'
        }
        else if (computerMove==='paper'){
            result='You Lose'
        }
        else if (computerMove==='scissors'){
            result='You win'
        }

    }

    if(result==='You win'){
        score.wins += 1
    } else if (result==='Tie'){
        score.Ties+=1
    } else if (result==='You Lose'){
        score.losses+=1
    };

    alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result}.\n wins:${score.wins}, losses: ${score.losses}, Ties: ${score.Ties}`)


}
    let result ='';
    function pickComputerMove(playerMove){
        let computerMove='';
        const randomNumber = Math.random();

        if (randomNumber>=0 && randomNumber<=1 / 3) {
            computerMove = 'rock'
        }
        else if(randomNumber>1 /3 && randomNumber<= 2/3){
            computerMove = 'paper'
        }
        else if(randomNumber>2/3 && randomNumber<= 1){
            computerMove = 'scissors'
        }
        return computerMove;
    }



</script>
</body>
</html>
