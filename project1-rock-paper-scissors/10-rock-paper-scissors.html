<body>
    <h1>Rock Paper Scissors</h1>
    <button class="rock-button" onclick="
    playGame('rock')
    ">
    <img src="emojis\rock-emoji.png" alt="">
</button>
<button class="paper-button" onclick="
    playGame('paper')
    ">

    playGame('scissors')

<p class="js-result"></p>

    resetScore()
">

</button>
